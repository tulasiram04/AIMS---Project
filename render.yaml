services:
  # 1. Backend Web Service
  - type: web
    name: backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # Render will prompt you to enter your existing database connection string during setup
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: GEMINI_API_KEY
        sync: false # User will input their Google Gemini API Key in the Render UI
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: "8000"
      - key: DEBUG
        value: "false"

  # 2. User Frontend Web Service
  - type: web
    name: frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: /api/v1
      - key: BACKEND_HOST
        fromService:
          type: web
          name: backend
          property: host
      - key: NGINX_ENVSUBST_FILTER
        value: "BACKEND_HOST RESOLVER_IP"

  # 3. Admin Frontend Web Service
  - type: web
    name: admin-frontend
    env: docker
    dockerfilePath: admin-frontend/Dockerfile
    dockerContext: admin-frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: /api/v1
      - key: BACKEND_HOST
        fromService:
          type: web
          name: backend
          property: host
      - key: NGINX_ENVSUBST_FILTER
        value: "BACKEND_HOST RESOLVER_IP"
